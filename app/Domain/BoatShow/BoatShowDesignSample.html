<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans)}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
    .btn{padding:6px 12px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
    .btn:hover{background:var(--color-background-secondary)}
    .btn.danger{border-color:#E24B4A;color:#A32D2D}
    .btn.danger:hover{background:#FCEBEB}
    .btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn.primary:hover{background:#0C447C}
    .label{font-size:12px;color:var(--color-text-secondary)}
    .canvas-wrap{overflow:auto;background:var(--color-background-tertiary);padding:16px}
    canvas{display:block;cursor:default;border-radius:4px}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:20px;width:320px;border:0.5px solid var(--color-border-secondary)}
    .modal h3{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--color-text-primary)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
    .field input{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
    .field input:focus{outline:none;border-color:#185FA5}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
    .info-bar{display:flex;gap:16px;padding:6px 12px;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
    .info-bar span b{color:var(--color-text-primary);font-weight:500}
    </style>
    
    <div class="toolbar">
      <button class="btn primary" onclick="openModal()">+ Add boat</button>
      <button class="btn" onclick="rotateSelected()">Rotate 90°</button>
      <button class="btn danger" onclick="deleteSelected()">Remove</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span class="label">Space:</span>
        <input type="number" id="spaceW" value="50" min="10" max="200" style="width:60px;padding:5px 8px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
        <span class="label">×</span>
        <input type="number" id="spaceH" value="50" min="10" max="200" style="width:60px;padding:5px 8px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
        <span class="label">ft</span>
        <button class="btn" onclick="resizeSpace()">Apply</button>
      </div>
    </div>
    
    <div class="info-bar">
      <span id="info-sel">No boat selected</span>
      <span style="margin-left:auto" id="info-count">0 boats</span>
    </div>
    
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="floorCanvas"></canvas>
    </div>
    
    <div class="modal-bg" id="modal">
      <div class="modal">
        <h3>Add boat</h3>
        <div class="field"><label>Boat name</label><input id="bName" type="text" value="Boat" /></div>
        <div class="field"><label>Length (ft)</label><input id="bLength" type="number" value="20" min="1" /></div>
        <div class="field"><label>Width (ft)</label><input id="bWidth" type="number" value="8" min="1" /></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div class="field" style="flex:1"><label>Color</label>
            <select id="bColor" style="width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
              <option value="#378ADD">Blue</option>
              <option value="#1D9E75">Teal</option>
              <option value="#D85A30">Coral</option>
              <option value="#639922">Green</option>
              <option value="#BA7517">Amber</option>
              <option value="#D4537E">Pink</option>
              <option value="#7F77DD">Purple</option>
              <option value="#888780">Gray</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn primary" onclick="addBoat()">Add to map</button>
        </div>
      </div>
    </div>
    
    <script>
    const canvas = document.getElementById('floorCanvas');
    const ctx = canvas.getContext('2d');
    
    let SPACE_W = 50, SPACE_H = 50;
    const SCALE = 10;
    let boats = [];
    let selected = null;
    let dragging = false;
    let dragOffX = 0, dragOffY = 0;
    let boatIdCounter = 0;
    
    const MARGIN = 24;
    
    function getCanvasSize() {
      return { cw: SPACE_W * SCALE + MARGIN * 2, ch: SPACE_H * SCALE + MARGIN * 2 };
    }
    
    function resizeCanvas() {
      const { cw, ch } = getCanvasSize();
      canvas.width = cw;
      canvas.height = ch;
      draw();
    }
    
    function resizeSpace() {
      SPACE_W = parseInt(document.getElementById('spaceW').value) || 50;
      SPACE_H = parseInt(document.getElementById('spaceH').value) || 50;
      resizeCanvas();
    }
    
    function draw() {
      const { cw, ch } = getCanvasSize();
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const bg = isDark ? '#1a1a1a' : '#f5f5f0';
      const floorBg = isDark ? '#2a2a28' : '#ffffff';
      const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
      const labelColor = isDark ? '#888' : '#aaa';
      const borderColor = isDark ? '#555' : '#ccc';
    
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, cw, ch);
    
      ctx.fillStyle = floorBg;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.rect(MARGIN, MARGIN, SPACE_W * SCALE, SPACE_H * SCALE);
      ctx.fill();
      ctx.stroke();
    
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= SPACE_W; x += 5) {
        ctx.beginPath();
        ctx.moveTo(MARGIN + x * SCALE, MARGIN);
        ctx.lineTo(MARGIN + x * SCALE, MARGIN + SPACE_H * SCALE);
        ctx.stroke();
      }
      for (let y = 0; y <= SPACE_H; y += 5) {
        ctx.beginPath();
        ctx.moveTo(MARGIN, MARGIN + y * SCALE);
        ctx.lineTo(MARGIN + SPACE_W * SCALE, MARGIN + y * SCALE);
        ctx.stroke();
      }
    
      ctx.fillStyle = labelColor;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      for (let x = 0; x <= SPACE_W; x += 10) {
        ctx.fillText(x + "'", MARGIN + x * SCALE, MARGIN - 6);
      }
      ctx.textAlign = 'right';
      for (let y = 0; y <= SPACE_H; y += 10) {
        ctx.fillText(y + "'", MARGIN - 4, MARGIN + y * SCALE + 3);
      }
    
      for (const boat of boats) {
        drawBoat(boat, boat === selected);
      }
    }
    
    function drawBoat(boat, isSel) {
      const px = MARGIN + boat.x * SCALE;
      const py = MARGIN + boat.y * SCALE;
      const pw = boat.rotated ? boat.w * SCALE : boat.l * SCALE;
      const ph = boat.rotated ? boat.l * SCALE : boat.w * SCALE;
    
      const oob = boat.x < 0 || boat.y < 0 ||
        (boat.rotated ? boat.x + boat.w > SPACE_W : boat.x + boat.l > SPACE_W) ||
        (boat.rotated ? boat.y + boat.l > SPACE_H : boat.y + boat.w > SPACE_H);
    
      ctx.globalAlpha = 0.88;
      ctx.fillStyle = oob ? '#E24B4A' : boat.color;
      ctx.strokeStyle = isSel ? '#fff' : 'rgba(0,0,0,0.25)';
      ctx.lineWidth = isSel ? 2.5 : 1;
    
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 4);
      ctx.fill();
      ctx.stroke();
      ctx.globalAlpha = 1;
    
      if (isSel) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.strokeRect(px - 2, py - 2, pw + 4, ph + 4);
        ctx.setLineDash([]);
      }
    
      const bowLen = Math.min(pw * 0.22, 20);
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.moveTo(px + pw - bowLen, py);
      ctx.lineTo(px + pw, py + ph / 2);
      ctx.lineTo(px + pw - bowLen, py + ph);
      ctx.closePath();
      ctx.fill();
    
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.min(13, Math.max(9, Math.min(pw, ph) * 0.22))}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxW = pw - bowLen - 4;
      let label = boat.name;
      ctx.font = `500 ${Math.min(12, Math.max(9, ph * 0.25))}px sans-serif`;
      if (ctx.measureText(label).width > maxW) {
        while (ctx.measureText(label + '…').width > maxW && label.length > 1) label = label.slice(0, -1);
        label += '…';
      }
      ctx.fillText(label, px + (pw - bowLen) / 2, py + ph / 2 - 6);
    
      const dim = boat.rotated ? `${boat.w}×${boat.l}ft` : `${boat.l}×${boat.w}ft`;
      ctx.font = `400 ${Math.min(10, Math.max(8, ph * 0.18))}px sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      if (ph > 22) ctx.fillText(dim, px + (pw - bowLen) / 2, py + ph / 2 + 7);
    }
    
    function hitTest(mx, my) {
      for (let i = boats.length - 1; i >= 0; i--) {
        const b = boats[i];
        const px = MARGIN + b.x * SCALE;
        const py = MARGIN + b.y * SCALE;
        const pw = b.rotated ? b.w * SCALE : b.l * SCALE;
        const ph = b.rotated ? b.l * SCALE : b.w * SCALE;
        if (mx >= px && mx <= px + pw && my >= py && my <= py + ph) return b;
      }
      return null;
    }
    
    function snap(val) { return Math.round(val); }
    
    canvas.addEventListener('mousedown', e => {
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const hit = hitTest(mx, my);
      if (hit) {
        selected = hit;
        dragging = true;
        dragOffX = mx - (MARGIN + hit.x * SCALE);
        dragOffY = my - (MARGIN + hit.y * SCALE);
        boats = boats.filter(b => b !== hit);
        boats.push(hit);
        updateInfo();
        draw();
      } else {
        selected = null;
        updateInfo();
        draw();
      }
    });
    
    canvas.addEventListener('mousemove', e => {
      if (!dragging || !selected) return;
      const r = canvas.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      selected.x = snap((mx - dragOffX - MARGIN) / SCALE);
      selected.y = snap((my - dragOffY - MARGIN) / SCALE);
      draw();
      updateInfo();
    });
    
    canvas.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('mouseleave', () => { dragging = false; });
    
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      const r = canvas.getBoundingClientRect();
      const mx = t.clientX - r.left, my = t.clientY - r.top;
      const hit = hitTest(mx, my);
      if (hit) {
        selected = hit; dragging = true;
        dragOffX = mx - (MARGIN + hit.x * SCALE);
        dragOffY = my - (MARGIN + hit.y * SCALE);
        boats = boats.filter(b => b !== hit); boats.push(hit);
        updateInfo(); draw();
      }
    }, { passive: false });
    
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!dragging || !selected) return;
      const t = e.touches[0];
      const r = canvas.getBoundingClientRect();
      const mx = t.clientX - r.left, my = t.clientY - r.top;
      selected.x = snap((mx - dragOffX - MARGIN) / SCALE);
      selected.y = snap((my - dragOffY - MARGIN) / SCALE);
      draw(); updateInfo();
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => { dragging = false; });
    
    function openModal() { document.getElementById('modal').classList.add('open'); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }
    
    function addBoat() {
      const name = document.getElementById('bName').value || 'Boat';
      const l = parseFloat(document.getElementById('bLength').value) || 20;
      const w = parseFloat(document.getElementById('bWidth').value) || 8;
      const color = document.getElementById('bColor').value;
      boats.push({ id: ++boatIdCounter, name, l, w, color, x: 2, y: 2, rotated: false });
      selected = boats[boats.length - 1];
      closeModal();
      updateInfo();
      draw();
      document.getElementById('bName').value = 'Boat';
    }
    
    function rotateSelected() {
      if (!selected) return;
      selected.rotated = !selected.rotated;
      draw();
      updateInfo();
    }
    
    function deleteSelected() {
      if (!selected) return;
      boats = boats.filter(b => b !== selected);
      selected = null;
      updateInfo();
      draw();
    }
    
    function updateInfo() {
      const el = document.getElementById('info-sel');
      const cnt = document.getElementById('info-count');
      if (selected) {
        const l = selected.rotated ? selected.w : selected.l;
        const w = selected.rotated ? selected.l : selected.w;
        const oob = selected.x < 0 || selected.y < 0 ||
          selected.x + l > SPACE_W || selected.y + w > SPACE_H;
        el.innerHTML = `<b>${selected.name}</b> — ${selected.l}×${selected.w} ft — position: ${selected.x}', ${selected.y}'${oob ? ' <span style="color:#E24B4A">⚠ outside boundary</span>' : ''}`;
      } else {
        el.textContent = 'No boat selected — click a boat to select';
      }
      cnt.innerHTML = `<b>${boats.length}</b> boat${boats.length !== 1 ? 's' : ''}`;
    }
    
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    
    resizeCanvas();
    updateInfo();
    </script>
